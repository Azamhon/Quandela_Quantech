# ============================================
# Hybrid Photonic QRC for Swaption Pricing
# Configuration File
# ============================================

data:
  train_path: "DATASETS/train.xlsx"
  test_path: "DATASETS/test_template.xlsx"
  sample_path: "DATASETS/sample_Simulated_Swaption_Price.xlsx"
  output_dir: "outputs"

preprocessing:
  winsorize_limits: [0.01, 0.01]  # 1st/99th percentile
  iqr_multiplier: 1.5

autoencoder:
  input_dim: 224
  hidden_dims: [128, 64]
  latent_dim: 20
  mask_ratio: 0.15
  sparsity_lambda: 0.0001
  learning_rate: 0.001
  epochs: 200
  batch_size: 32
  patience: 30
  val_split: 50  # last N timesteps for validation

quantum_reservoir:
  ensemble:
    - n_modes: 12
      n_photons: 3
      seed: 42
    - n_modes: 10
      n_photons: 4
      seed: 43
    - n_modes: 16
      n_photons: 2
      seed: 44
  use_fock: true  # true = full Fock space, false = no bunching

hybrid_model:
  window_size: 5
  hidden_dims: [256, 128]
  dropout: 0.2
  learning_rate: 0.001
  epochs: 300
  batch_size: 32
  patience: 30
  surface_loss_weight: 0.1  # alpha in combined loss
  gradient_clip: 1.0

device: "cpu"  # "cuda", "cpu", or "mps"
seed: 42
